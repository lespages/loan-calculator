<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Payoff Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0;
            }
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            padding: 0 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
                margin-bottom: 15px;
            }
        }

        .loans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .loans-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .loan-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .loan-card {
                padding: 15px;
                border-radius: 10px;
                overflow: hidden;
            }
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }

        .loan-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .loan-card h3 {
                font-size: 1.1em;
                margin-bottom: 12px;
            }
        }

        .input-group {
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .input-group {
                margin-bottom: 10px;
            }
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 0.95em;
        }

        @media (max-width: 768px) {
            label {
                font-size: 0.9em;
                margin-bottom: 4px;
            }
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        @media (max-width: 768px) {
            input, select {
                padding: 10px;
                font-size: 16px; /* Prevents zoom on iOS */
                border-radius: 6px;
            }
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        small {
            display: block;
            margin-top: 4px;
            color: #666;
            font-size: 0.8em;
            line-height: 1.3;
        }

        @media (max-width: 768px) {
            small {
                font-size: 0.75em;
            }
        }

        .results {
            background: transparent;
            padding: 0;
            border-radius: 0;
            margin-top: 20px;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .results {
                overflow: hidden;
            }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .result-label {
            color: #666;
        }

        .result-value {
            font-weight: 600;
            color: #333;
        }

        .add-loan-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 14px 35px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            min-height: 44px; /* iOS recommended touch target */
        }

        @media (max-width: 768px) {
            .add-loan-btn {
                padding: 12px 30px;
                font-size: 15px;
                margin-bottom: 15px;
            }
        }

        .add-loan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .add-loan-btn:active {
            transform: translateY(0);
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .summary-card {
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 15px;
            }
        }

        .summary-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3em;
        }

        @media (max-width: 768px) {
            .summary-card h2 {
                font-size: 1.1em;
                margin-bottom: 12px;
            }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }

        .summary-item {
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .summary-item {
                padding: 12px 8px;
                border-radius: 6px;
            }
        }

        .summary-label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 6px;
        }

        @media (max-width: 768px) {
            .summary-label {
                font-size: 0.75em;
                margin-bottom: 4px;
            }
        }

        .summary-value {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .summary-value {
                font-size: 1.2em;
            }
        }

        .amortization-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .amortization-table {
                font-size: 0.75em;
                min-width: 600px;
            }
        }

        .amortization-table th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            text-align: left;
            white-space: nowrap;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .amortization-table th {
                padding: 10px 6px;
                font-size: 0.8em;
            }
        }

        .amortization-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .amortization-table td {
                padding: 8px 6px;
            }
        }

        .amortization-table tbody tr {
            cursor: pointer;
        }

        .amortization-table tbody tr:hover {
            background: #e8ebff;
        }

        .toggle-schedule {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .toggle-schedule:hover {
            background: #5568d3;
        }

        .schedule-container {
            display: none;
            margin-top: 15px;
            max-height: 400px;
            overflow: hidden;
        }

        .schedule-container.show {
            display: block;
            overflow: hidden;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-close:hover {
            background: #cc0000;
        }

        .modal h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .simple-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .simple-row:last-of-type {
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .highlight-section {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #4caf50;
        }

        .highlight-section.blue {
            background: #e3f2fd;
            border-left-color: #2196f3;
        }

        .workings-toggle-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 15px 0;
            display: block;
            width: 100%;
            transition: background 0.3s;
        }

        .workings-toggle-btn:hover {
            background: #5568d3;
        }

        .detailed-workings {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .detailed-workings.show {
            display: block;
        }

        .calc-step {
            padding: 8px 0;
            color: #666;
            font-family: monospace;
        }

        /* Multi-Debt Overview Styles */
        .multi-debt-overview {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 30px;
        }

        .multi-debt-overview h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .priority-list {
            list-style: none;
            padding: 0;
        }

        .priority-item {
            background: #f8f9ff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .priority-item.urgent {
            border-left-color: #ff4444;
            background: #ffebee;
        }

        .priority-item.soon {
            border-left-color: #ff9800;
            background: #fff3e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Debt Payoff Calculator</h1>
        
        <button class="add-loan-btn" onclick="addLoan()">+ Add Debt</button>
        
        <div class="loans-grid" id="loansGrid"></div>
        
        <div class="summary-card">
            <h2>Overall Summary</h2>
            <div class="summary-grid" id="summaryGrid">
                <div class="summary-item">
                    <div class="summary-label">Total Borrowed</div>
                    <div class="summary-value" id="totalBorrowed">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total Interest</div>
                    <div class="summary-value" id="totalInterest">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total to Pay</div>
                    <div class="summary-value" id="totalPayment">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Combined Monthly</div>
                    <div class="summary-value" id="combinedMonthly">$0</div>
                </div>
            </div>
        </div>

        <!-- Multi-Debt Overview -->
        <div class="multi-debt-overview" id="multiDebtOverview" style="display: none;">
            <h2>💰 All Debts Summary</h2>
            <div class="summary-grid" style="margin-bottom: 20px;">
                <div class="summary-item">
                    <div class="summary-label">Total Monthly Payment</div>
                    <div class="summary-value" id="totalMonthlyAll">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Average Daily Savings</div>
                    <div class="summary-value" id="avgDailySavings">$0/day</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total Debt Remaining</div>
                    <div class="summary-value" id="totalDebtRemaining">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Next Payment Due</div>
                    <div class="summary-value" id="nextPaymentDue">-</div>
                </div>
            </div>
            
            <h3 style="color: #667eea; margin-bottom: 15px;">📋 Payment Priority</h3>
            <ul class="priority-list" id="priorityList"></ul>
        </div>
    </div>

    <div class="modal" id="workingsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let loanCounter = 0;
        let loans = [];
        let currentSchedule = null;
        let currentLoanData = null;

        function formatCurrency(amount, decimals = 0) {
            return amount.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function calculateMonthlyPayment(principal, monthlyRate, months) {
            if (monthlyRate === 0) {
                return principal / months;
            }
            const rate = monthlyRate / 100;
            const payment = principal * (rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            return payment;
        }

        function generateAmortizationSchedule(principal, monthlyRate, months, monthlyPayment, loanData) {
            const schedule = [];
            let balance = principal;
            const rate = monthlyRate / 100;

            // Parse today's date from YYYY-MM-DD
            let todayDate = null;
            if (loanData && loanData.todayDate) {
                const parts = loanData.todayDate.split('-');
                todayDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            } else {
                todayDate = new Date();
            }
            
            // Parse expected repayment date from YYYY-MM-DD
            let firstPaymentDate = null;
            if (loanData && loanData.expectedRepaymentDate) {
                const parts = loanData.expectedRepaymentDate.split('-');
                firstPaymentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }

            for (let month = 1; month <= months; month++) {
                const interest = balance * rate;
                const principalPayment = monthlyPayment - interest;
                balance -= principalPayment;

                let paymentDate = null;
                let daysUntilPayment = 30;
                let daysFromToday = null;
                
                if (firstPaymentDate) {
                    if (month === 1) {
                        paymentDate = new Date(firstPaymentDate);
                    } else {
                        paymentDate = new Date(firstPaymentDate);
                        paymentDate.setMonth(paymentDate.getMonth() + (month - 1));
                    }
                    
                    const timeDiffFromToday = paymentDate.getTime() - todayDate.getTime();
                    daysFromToday = Math.ceil(timeDiffFromToday / (1000 * 60 * 60 * 24));
                    
                    if (month === 1) {
                        daysUntilPayment = daysFromToday > 0 ? daysFromToday : 1;
                    } else {
                        const prevPaymentDate = new Date(firstPaymentDate);
                        prevPaymentDate.setMonth(prevPaymentDate.getMonth() + (month - 2));
                        const timeDiff = paymentDate.getTime() - prevPaymentDate.getTime();
                        daysUntilPayment = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                    }
                }

                const earlyPayoffAmount = balance + interest;

                schedule.push({
                    month: month,
                    payment: monthlyPayment,
                    principal: principalPayment,
                    interest: interest,
                    balance: Math.max(0, balance),
                    earlyPayoff: earlyPayoffAmount,
                    paymentDate: paymentDate,
                    daysUntilPayment: daysUntilPayment,
                    daysFromToday: daysFromToday,
                    dailySavings: monthlyPayment / daysUntilPayment
                });
            }

            return schedule;
        }

        function addLoan() {
            loanCounter++;
            const loanId = `loan-${loanCounter}`;
            
            loans.push({
                id: loanId,
                name: `Creditor ${loanCounter}`,
                todayDate: new Date().toISOString().split('T')[0],
                statementDate: '',
                daysToAdd: 25,
                expectedRepaymentDate: '',
                principal: 0,
                yearlyRate: 0,
                rate: 0,
                months: 0
            });

            renderLoans();
        }

        function removeLoan(loanId) {
            loans = loans.filter(loan => loan.id !== loanId);
            renderLoans();
            updateSummary();
            updateMultiDebtOverview();
        }

        function updateLoan(loanId, field, value) {
            const loan = loans.find(l => l.id === loanId);
            if (loan) {
                if (field === 'name') {
                    loan[field] = value;
                } else if (field === 'todayDate' || field === 'statementDate') {
                    loan[field] = value;
                } else {
                    loan[field] = parseFloat(value) || 0;
                }
                
                if ((field === 'statementDate' || field === 'daysToAdd') && loan.statementDate) {
                    const parts = loan.statementDate.split('-');
                    const year = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const day = parseInt(parts[2]);
                    
                    const statementDate = new Date(year, month, day);
                    const daysToAdd = parseInt(loan.daysToAdd) || 25;
                    
                    const repaymentDate = new Date(statementDate);
                    repaymentDate.setDate(repaymentDate.getDate() + daysToAdd);
                    
                    const repayYear = repaymentDate.getFullYear();
                    const repayMonth = String(repaymentDate.getMonth() + 1).padStart(2, '0');
                    const repayDay = String(repaymentDate.getDate()).padStart(2, '0');
                    
                    loan.expectedRepaymentDate = `${repayYear}-${repayMonth}-${repayDay}`;
                    
                    const repaymentInput = document.getElementById(`repayment-date-${loanId}`);
                    if (repaymentInput) {
                        repaymentInput.value = loan.expectedRepaymentDate;
                    }
                }
                
                calculateLoan(loanId);
                updateSummary();
                updateMultiDebtOverview();
            }
        }

        function updateYearlyRate(loanId, value) {
            const loan = loans.find(l => l.id === loanId);
            if (loan) {
                loan.yearlyRate = parseFloat(value) || 0;
                loan.rate = loan.yearlyRate / 12;
                
                const monthlyRateInput = document.getElementById(`monthly-rate-${loanId}`);
                if (monthlyRateInput) {
                    monthlyRateInput.value = loan.rate.toFixed(2);
                }
                
                calculateLoan(loanId);
                updateSummary();
                updateMultiDebtOverview();
            }
        }

        function updateExpectedRepaymentDate(loanId, value) {
            const loan = loans.find(l => l.id === loanId);
            if (loan && value) {
                loan.expectedRepaymentDate = value;
                
                // Calculate days from today to expected repayment date
                const todayParts = loan.todayDate.split('-');
                const todayDateObj = new Date(parseInt(todayParts[0]), parseInt(todayParts[1]) - 1, parseInt(todayParts[2]));
                
                const repayParts = value.split('-');
                const repayDateObj = new Date(parseInt(repayParts[0]), parseInt(repayParts[1]) - 1, parseInt(repayParts[2]));
                
                const timeDiff = repayDateObj.getTime() - todayDateObj.getTime();
                const daysDiff = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                
                loan.daysToAdd = daysDiff;
                
                // Update the days display
                const daysInput = document.getElementById(`days-until-${loanId}`);
                if (daysInput) {
                    daysInput.value = daysDiff;
                }
                
                calculateLoan(loanId);
                updateSummary();
                updateMultiDebtOverview();
            }
        }

        function calculateLoan(loanId) {
            const loan = loans.find(l => l.id === loanId);
            if (!loan || loan.principal === 0 || loan.months === 0) return;

            const monthlyPayment = calculateMonthlyPayment(loan.principal, loan.rate, loan.months);
            const totalPayment = monthlyPayment * loan.months;
            const totalInterest = totalPayment - loan.principal;

            loan.monthlyPayment = monthlyPayment;
            loan.totalPayment = totalPayment;
            loan.totalInterest = totalInterest;
            loan.schedule = generateAmortizationSchedule(loan.principal, loan.rate, loan.months, monthlyPayment, loan);

            currentSchedule = loan.schedule;
            currentLoanData = loan;

            renderLoanResults(loanId);
        }

        function renderLoanResults(loanId) {
            const loan = loans.find(l => l.id === loanId);
            const resultsDiv = document.getElementById(`results-${loanId}`);
            
            if (!loan.monthlyPayment) {
                resultsDiv.innerHTML = '';
                return;
            }

            resultsDiv.innerHTML = `
                <div class="results">
                    <div style="background: #f8f9ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                        <div class="result-row">
                            <span class="result-label">Monthly Payment:</span>
                            <span class="result-value">$${formatCurrency(loan.monthlyPayment, 0)}</span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Total Interest:</span>
                            <span class="result-value">$${formatCurrency(loan.totalInterest, 0)}</span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Total Payment:</span>
                            <span class="result-value">$${formatCurrency(loan.totalPayment, 0)}</span>
                        </div>
                    </div>
                    <button class="toggle-schedule" onclick="toggleSchedule('${loanId}')">
                        View Payment Schedule
                    </button>
                    <div class="schedule-container" id="schedule-${loanId}">
                        <p style="color: #667eea; font-size: 0.9em; margin-bottom: 10px; font-style: italic;">
                            💡 Click on any month for details
                        </p>
                        ${generateScheduleTable(loan.schedule, loanId)}
                    </div>
                </div>
            `;
        }

        function generateScheduleTable(schedule, loanId) {
            let html = '<div style="background: white; border-radius: 12px; padding: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 10px; overflow: hidden; max-width: 100%;">';
            html += '<div style="overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%;">';
            html += '<table class="amortization-table" style="margin: 0; max-width: 100%;"><thead><tr>';
            html += '<th>Month</th><th>Payment Date</th><th>Days Left</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th><th>Early Payoff</th>';
            html += '</tr></thead><tbody>';

            schedule.forEach((row, index) => {
                let dateStr = '-';
                if (row.paymentDate) {
                    const year = row.paymentDate.getFullYear();
                    const month = row.paymentDate.toLocaleString('en-US', { month: 'short' });
                    const day = row.paymentDate.getDate();
                    dateStr = `${month} ${day}, ${year}`;
                }
                
                const daysLeftStr = row.daysFromToday !== null ? `${row.daysFromToday} days` : '-';
                const daysLeftColor = row.daysFromToday !== null && row.daysFromToday < 7 ? '#ff4444' : row.daysFromToday < 14 ? '#ff9800' : '#666';
                
                html += `<tr onclick="showWorkings('${loanId}', ${index})" style="background: ${index % 2 === 0 ? 'white' : '#f8f9ff'};">
                    <td>${row.month}</td>
                    <td>${dateStr}</td>
                    <td style="color: ${daysLeftColor}; font-weight: 600;">${daysLeftStr}</td>
                    <td>$${formatCurrency(row.payment, 0)}</td>
                    <td>$${formatCurrency(row.principal, 0)}</td>
                    <td>$${formatCurrency(row.interest, 0)}</td>
                    <td>$${formatCurrency(row.balance, 0)}</td>
                    <td style="color: #28a745; font-weight: 600;">$${formatCurrency(row.earlyPayoff, 0)}</td>
                </tr>`;
            });

            html += '</tbody></table></div></div>';
            return html;
        }

        function toggleSchedule(loanId) {
            const scheduleDiv = document.getElementById(`schedule-${loanId}`);
            scheduleDiv.classList.toggle('show');
        }

        function showWorkings(loanId, monthIndex) {
            const loan = loans.find(l => l.id === loanId);
            if (!loan || !loan.schedule) return;

            currentLoanData = loan;
            currentSchedule = loan.schedule;
            
            const month = loan.schedule[monthIndex];
            const prevBalance = monthIndex === 0 ? loan.principal : loan.schedule[monthIndex - 1].balance;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h3>Month ${month.month} Payment Details</h3>
                
                ${month.paymentDate && month.daysFromToday !== null ? `
                <div class="simple-row" style="background: ${month.daysFromToday < 7 ? '#ffebee' : month.daysFromToday < 14 ? '#fff3e0' : '#e3f2fd'}; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                    <span style="font-size: 0.95em;">📅 <strong>Due:</strong> ${month.paymentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                    <span style="color: ${month.daysFromToday < 7 ? '#d32f2f' : month.daysFromToday < 14 ? '#f57c00' : '#1976d2'}; font-weight: bold; font-size: 1.2em;">${month.daysFromToday} days left</span>
                </div>
                ` : ''}
                
                <div class="simple-row" style="padding: 15px 0; border-bottom: 2px solid #667eea;">
                    <span style="font-size: 1.1em;"><strong>💳 Monthly Payment</strong></span>
                    <span style="font-size: 1.5em; font-weight: bold; color: #667eea;">$${formatCurrency(month.payment, 0)}</span>
                </div>
                
                <div class="simple-row">
                    <span>Interest</span>
                    <span style="color: #ff5722;">$${formatCurrency(month.interest, 0)}</span>
                </div>
                
                <div class="simple-row">
                    <span>Principal</span>
                    <span style="color: #4caf50;">$${formatCurrency(month.principal, 0)}</span>
                </div>
                
                <div class="simple-row" style="border-bottom: 2px solid #e0e0e0; padding-bottom: 12px; margin-bottom: 15px;">
                    <span>Remaining Balance</span>
                    <span>$${formatCurrency(month.balance, 0)}</span>
                </div>
                
                <div class="highlight-section">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span><strong>⚡ Pay Off Early</strong></span>
                        <span style="color: #28a745; font-weight: bold; font-size: 1.4em;">$${formatCurrency(month.earlyPayoff, 0)}</span>
                    </div>
                    <div style="font-size: 0.9em; color: #2e7d32;">
                        💡 Save $${formatCurrency((loan.totalInterest - month.interest - loan.schedule.slice(0, monthIndex).reduce((sum, m) => sum + m.interest, 0)), 0)} in future interest
                    </div>
                </div>
                
                <div class="highlight-section blue">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span><strong>📅 Daily Savings Needed</strong></span>
                        <span style="color: #1976d2; font-weight: bold; font-size: 1.4em;">$${formatCurrency(month.dailySavings, 0)}/day</span>
                    </div>
                    ${month.daysFromToday !== null ? `
                    <div style="font-size: 0.9em; color: #1565c0;">
                        Save $${formatCurrency(month.dailySavings, 0)} daily for ${month.daysFromToday} days = $${formatCurrency(month.dailySavings * month.daysFromToday, 0)}
                    </div>
                    ` : ''}
                </div>

                <button class="workings-toggle-btn" onclick="toggleDetailedWorkings()">
                    <span id="toggle-text">📊 Show Detailed Calculations</span>
                </button>

                <div class="detailed-workings" id="detailed-workings">
                    <div class="calc-step"><strong>Interest Calculation:</strong></div>
                    <div class="calc-step">$${formatCurrency(prevBalance, 0)} × ${loan.rate.toFixed(2)}% = $${formatCurrency(month.interest, 0)}</div>
                    
                    <div class="calc-step" style="margin-top: 10px;"><strong>Principal Payment:</strong></div>
                    <div class="calc-step">$${formatCurrency(month.payment, 0)} - $${formatCurrency(month.interest, 0)} = $${formatCurrency(month.principal, 0)}</div>
                    
                    <div class="calc-step" style="margin-top: 10px;"><strong>New Balance:</strong></div>
                    <div class="calc-step">$${formatCurrency(prevBalance, 0)} - $${formatCurrency(month.principal, 0)} = $${formatCurrency(month.balance, 0)}</div>
                    
                    <div class="calc-step" style="margin-top: 10px;"><strong>Early Payoff:</strong></div>
                    <div class="calc-step">$${formatCurrency(month.balance, 0)} + $${formatCurrency(month.interest, 0)} = $${formatCurrency(month.earlyPayoff, 0)}</div>
                </div>
            `;

            document.getElementById('workingsModal').classList.add('show');
        }

        function toggleDetailedWorkings() {
            const detailedSection = document.getElementById('detailed-workings');
            const toggleText = document.getElementById('toggle-text');
            
            if (detailedSection.classList.contains('show')) {
                detailedSection.classList.remove('show');
                toggleText.textContent = '📊 Show Detailed Calculations';
            } else {
                detailedSection.classList.add('show');
                toggleText.textContent = '📊 Hide Detailed Calculations';
            }
        }

        function closeModal() {
            document.getElementById('workingsModal').classList.remove('show');
        }

        document.getElementById('workingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function renderLoans() {
            const grid = document.getElementById('loansGrid');
            
            // Save the state of which schedules are visible
            const scheduleStates = {};
            loans.forEach(loan => {
                const scheduleDiv = document.getElementById(`schedule-${loan.id}`);
                if (scheduleDiv) {
                    scheduleStates[loan.id] = scheduleDiv.classList.contains('show');
                }
            });
            
            grid.innerHTML = '';

            loans.forEach((loan, index) => {
                const card = document.createElement('div');
                card.className = 'loan-card';
                card.innerHTML = `
                    ${loans.length > 1 ? `<button class="remove-btn" onclick="removeLoan('${loan.id}')">×</button>` : ''}
                    <h3>Debt ${index + 1}</h3>
                    
                    <div class="input-group">
                        <label>Creditor/Lender Name</label>
                        <input type="text" value="${loan.name}" 
                               onfocus="if(this.value.startsWith('Creditor')) this.value=''"
                               onchange="updateLoan('${loan.id}', 'name', this.value)">
                    </div>
                    
                    <div class="input-group">
                        <label>Today's Date</label>
                        <input type="date" value="${loan.todayDate || new Date().toISOString().split('T')[0]}" 
                               id="today-date-${loan.id}"
                               onchange="updateLoan('${loan.id}', 'todayDate', this.value)">
                    </div>
                    
                    <div class="input-group">
                        <label>Statement Generated Date</label>
                        <input type="date" value="${loan.statementDate || ''}" 
                               id="statement-date-${loan.id}"
                               onchange="updateLoan('${loan.id}', 'statementDate', this.value)">
                        <small>When the statement was issued</small>
                    </div>
                    
                    <div class="input-group">
                        <label>Expected First Repayment Date</label>
                        <input type="date" value="${loan.expectedRepaymentDate || ''}" 
                               id="repayment-date-${loan.id}"
                               onchange="updateExpectedRepaymentDate('${loan.id}', this.value)">
                        <small style="color: #28a745; font-weight: 600;">When is your payment due?</small>
                    </div>
                    
                    <div class="input-group">
                        <label>Days Until Payment</label>
                        <input type="number" value="${loan.daysToAdd || ''}" 
                               id="days-until-${loan.id}"
                               readonly
                               style="background: #f0f0f0; cursor: not-allowed;">
                        <small>Auto-calculated: Expected Date - Today</small>
                    </div>
                    
                    <div class="input-group">
                        <label>Debt Amount ($)</label>
                        <input type="number" value="${loan.principal || ''}" 
                               onchange="updateLoan('${loan.id}', 'principal', this.value)"
                               placeholder="e.g., 12890">
                    </div>
                    
                    <div class="input-group">
                        <label>Yearly Interest Rate (%)</label>
                        <input type="number" step="0.01" value="${loan.yearlyRate || ''}" 
                               onchange="updateYearlyRate('${loan.id}', this.value)"
                               placeholder="e.g., 48">
                    </div>
                    
                    <div class="input-group">
                        <label>Monthly Interest Rate (%)</label>
                        <input type="number" step="0.01" value="${loan.rate || ''}" 
                               id="monthly-rate-${loan.id}"
                               readonly
                               style="background: #f0f0f0; cursor: not-allowed;"
                               placeholder="Auto-calculated">
                    </div>
                    
                    <div class="input-group">
                        <label>Repayment Period (Months)</label>
                        <input type="number" value="${loan.months || ''}" 
                               onchange="updateLoan('${loan.id}', 'months', this.value)"
                               placeholder="e.g., 10">
                    </div>
                    
                    <div id="results-${loan.id}"></div>
                `;
                grid.appendChild(card);
                
                // Re-render results if they exist
                if (loan.monthlyPayment) {
                    renderLoanResults(loan.id);
                    
                    // Restore the schedule visibility state
                    if (scheduleStates[loan.id]) {
                        setTimeout(() => {
                            const scheduleDiv = document.getElementById(`schedule-${loan.id}`);
                            if (scheduleDiv) {
                                scheduleDiv.classList.add('show');
                            }
                        }, 10);
                    }
                }
            });

            if (loans.length === 0) {
                addLoan();
            }
        }

        function updateSummary() {
            let totalBorrowed = 0;
            let totalInterest = 0;
            let totalPayment = 0;
            let combinedMonthly = 0;

            loans.forEach(loan => {
                if (loan.monthlyPayment) {
                    totalBorrowed += loan.principal;
                    totalInterest += loan.totalInterest;
                    totalPayment += loan.totalPayment;
                    combinedMonthly += loan.monthlyPayment;
                }
            });

            document.getElementById('totalBorrowed').textContent = `$${formatCurrency(totalBorrowed, 0)}`;
            document.getElementById('totalInterest').textContent = `$${formatCurrency(totalInterest, 0)}`;
            document.getElementById('totalPayment').textContent = `$${formatCurrency(totalPayment, 0)}`;
            document.getElementById('combinedMonthly').textContent = `$${formatCurrency(combinedMonthly, 0)}`;
        }

        function updateMultiDebtOverview() {
            const activeLoans = loans.filter(l => l.monthlyPayment && l.schedule);
            
            if (activeLoans.length <= 1) {
                document.getElementById('multiDebtOverview').style.display = 'none';
                return;
            }

            document.getElementById('multiDebtOverview').style.display = 'block';

            let totalMonthly = 0;
            let totalDailySavings = 0;
            let totalDebt = 0;
            let nextPayment = null;
            let nextPaymentDays = Infinity;
            let month1Total = 0; // Total payment needed for Month 1

            const priorityDebts = [];

            activeLoans.forEach(loan => {
                totalMonthly += loan.monthlyPayment;
                totalDebt += loan.schedule[0].balance + loan.schedule[0].principal;
                month1Total += loan.schedule[0].payment; // Add Month 1 payment
                
                if (loan.schedule[0] && loan.schedule[0].daysFromToday !== null) {
                    totalDailySavings += loan.schedule[0].dailySavings;
                    
                    if (loan.schedule[0].daysFromToday < nextPaymentDays) {
                        nextPaymentDays = loan.schedule[0].daysFromToday;
                        nextPayment = {
                            date: loan.schedule[0].paymentDate,
                            days: loan.schedule[0].daysFromToday
                        };
                    }

                    priorityDebts.push({
                        name: loan.name,
                        daysLeft: loan.schedule[0].daysFromToday,
                        dailySavings: loan.schedule[0].dailySavings,
                        monthlyPayment: loan.monthlyPayment,
                        month1Payment: loan.schedule[0].payment,
                        date: loan.schedule[0].paymentDate
                    });
                }
            });

            // Sort by days left (ascending)
            priorityDebts.sort((a, b) => a.daysLeft - b.daysLeft);

            document.getElementById('totalMonthlyAll').textContent = `$${formatCurrency(totalMonthly, 0)}`;
            document.getElementById('avgDailySavings').textContent = `$${formatCurrency(totalDailySavings, 0)}/day`;
            document.getElementById('totalDebtRemaining').textContent = `$${formatCurrency(totalDebt, 0)}`;
            
            if (nextPayment) {
                const dateStr = nextPayment.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                document.getElementById('nextPaymentDue').textContent = `${dateStr} (${nextPayment.days} days)`;
            }

            // Render priority list with Month 1 breakdown
            const priorityList = document.getElementById('priorityList');
            priorityList.innerHTML = '';

            // Add Month 1 Summary at the top
            const month1Summary = document.createElement('li');
            month1Summary.className = 'priority-item';
            month1Summary.style.background = '#e8f5e9';
            month1Summary.style.borderLeft = '4px solid #4caf50';
            month1Summary.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 0.9em; color: #2e7d32; margin-bottom: 8px;">💰 <strong>MONTH 1 TOTAL NEEDED</strong></div>
                    <div style="font-size: 2em; font-weight: bold; color: #4caf50; margin-bottom: 5px;">
                        $${formatCurrency(month1Total, 0)}
                    </div>
                    <div style="font-size: 0.85em; color: #2e7d32; margin-bottom: 10px;">
                        Save $${formatCurrency(totalDailySavings, 0)}/day × ${nextPayment ? nextPayment.days : '30'} days
                    </div>
                    <div style="background: white; padding: 10px; border-radius: 6px; margin-top: 10px;">
                        <div style="font-size: 0.85em; color: #666; margin-bottom: 5px;">Daily Savings Breakdown:</div>
                        ${priorityDebts.map((debt, idx) => `
                            <div style="display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.85em;">
                                <span style="color: #333;">${debt.name}</span>
                                <span style="font-weight: 600; color: #4caf50;">$${formatCurrency(debt.dailySavings, 0)}/day</span>
                            </div>
                        `).join('')}
                        <div style="border-top: 2px solid #4caf50; margin-top: 5px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: bold;">
                            <span style="color: #2e7d32;">TOTAL PER DAY:</span>
                            <span style="color: #4caf50; font-size: 1.1em;">$${formatCurrency(totalDailySavings, 0)}</span>
                        </div>
                    </div>
                </div>
            `;
            priorityList.appendChild(month1Summary);

            // Add individual debt breakdown
            priorityDebts.forEach((debt, index) => {
                const urgencyClass = debt.daysLeft < 7 ? 'urgent' : debt.daysLeft < 14 ? 'soon' : '';
                const dateStr = debt.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                const li = document.createElement('li');
                li.className = `priority-item ${urgencyClass}`;
                li.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${index + 1}. ${debt.name}</strong><br>
                            <span style="font-size: 0.9em;">Due ${dateStr} (${debt.daysLeft} days) • Month 1: $${formatCurrency(debt.month1Payment, 0)}</span>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 1.2em; font-weight: bold; color: ${urgencyClass === 'urgent' ? '#d32f2f' : urgencyClass === 'soon' ? '#f57c00' : '#667eea'};">
                                $${formatCurrency(debt.dailySavings, 0)}/day
                            </div>
                        </div>
                    </div>
                `;
                priorityList.appendChild(li);
            });
        }

        // Initialize with one loan
        addLoan();
    </script>
</body>
</html>
