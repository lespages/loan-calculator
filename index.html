<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Payoff Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .loans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .loan-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }

        .loan-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .results {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .result-label {
            color: #666;
        }

        .result-value {
            font-weight: 600;
            color: #333;
        }

        .add-loan-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .add-loan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .summary-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .summary-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .summary-item {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .summary-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .summary-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }

        .amortization-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .amortization-table th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
        }

        .amortization-table td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .amortization-table tr:hover {
            background: #f8f9ff;
        }

        .toggle-schedule {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .toggle-schedule:hover {
            background: #5568d3;
        }

        .schedule-container {
            display: none;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .schedule-container.show {
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-close:hover {
            background: #cc0000;
        }

        .modal h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .workings-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .workings-section h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .calculation-step {
            padding: 8px 0;
            font-family: 'Courier New', monospace;
            color: #333;
            line-height: 1.6;
        }

        .calculation-step .formula {
            color: #666;
            font-size: 0.95em;
        }

        .calculation-step .result {
            color: #667eea;
            font-weight: bold;
            margin-left: 10px;
        }

        .highlight-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .highlight-box strong {
            color: #856404;
        }

        .amortization-table tbody tr {
            cursor: pointer;
        }

        .amortization-table tbody tr:hover {
            background: #e8ebff !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Debt Payoff Calculator</h1>
        
        <button class="add-loan-btn" onclick="addLoan()">+ Add Debt</button>
        
        <div class="loans-grid" id="loansGrid"></div>
        
        <div class="summary-card">
            <h2>Overall Summary</h2>
            <div class="summary-grid" id="summaryGrid">
                <div class="summary-item">
                    <div class="summary-label">Total Borrowed</div>
                    <div class="summary-value" id="totalBorrowed">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total Interest</div>
                    <div class="summary-value" id="totalInterest">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total to Pay</div>
                    <div class="summary-value" id="totalPayment">$0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Combined Monthly</div>
                    <div class="summary-value" id="combinedMonthly">$0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="workingsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let loanCounter = 0;
        let loans = [];

        function formatCurrency(amount, decimals = 0) {
            return amount.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function calculateMonthlyPayment(principal, monthlyRate, months) {
            if (monthlyRate === 0) {
                return principal / months;
            }
            const rate = monthlyRate / 100;
            const payment = principal * (rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            return payment;
        }

        function generateAmortizationSchedule(principal, monthlyRate, months, monthlyPayment, loanData) {
            const schedule = [];
            let balance = principal;
            const rate = monthlyRate / 100;

            // Parse today's date from YYYY-MM-DD
            let todayDate = null;
            if (loanData && loanData.todayDate) {
                const parts = loanData.todayDate.split('-');
                todayDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            } else {
                todayDate = new Date();
            }
            
            // Parse expected repayment date from YYYY-MM-DD
            let firstPaymentDate = null;
            if (loanData && loanData.expectedRepaymentDate) {
                const parts = loanData.expectedRepaymentDate.split('-');
                firstPaymentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }

            for (let month = 1; month <= months; month++) {
                const interest = balance * rate;
                const principalPayment = monthlyPayment - interest;
                balance -= principalPayment;

                // Calculate payment date and days remaining
                let paymentDate = null;
                let daysUntilPayment = 30; // Default
                let daysFromToday = null;
                
                if (firstPaymentDate) {
                    if (month === 1) {
                        // Month 1: Use the expected first repayment date
                        paymentDate = new Date(firstPaymentDate);
                    } else {
                        // Subsequent months: Add (month - 1) months to first payment date
                        paymentDate = new Date(firstPaymentDate);
                        paymentDate.setMonth(paymentDate.getMonth() + (month - 1));
                    }
                    
                    // Days left = Payment Date - Today's Date (for ALL months)
                    const timeDiffFromToday = paymentDate.getTime() - todayDate.getTime();
                    daysFromToday = Math.ceil(timeDiffFromToday / (1000 * 60 * 60 * 24));
                    
                    // For daily savings calculation
                    if (month === 1) {
                        // First payment: use days from today to first payment
                        daysUntilPayment = daysFromToday > 0 ? daysFromToday : 1;
                    } else {
                        // Subsequent payments: days between payments (for saving calculation)
                        const prevPaymentDate = new Date(firstPaymentDate);
                        prevPaymentDate.setMonth(prevPaymentDate.getMonth() + (month - 2));
                        const timeDiff = paymentDate.getTime() - prevPaymentDate.getTime();
                        daysUntilPayment = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                    }
                }

                // Calculate early payoff amount
                const earlyPayoffAmount = balance + interest;

                schedule.push({
                    month: month,
                    payment: monthlyPayment,
                    principal: principalPayment,
                    interest: interest,
                    balance: Math.max(0, balance),
                    earlyPayoff: earlyPayoffAmount,
                    paymentDate: paymentDate,
                    daysUntilPayment: daysUntilPayment,
                    daysFromToday: daysFromToday,
                    dailySavings: monthlyPayment / daysUntilPayment
                });
            }

            return schedule;
        }

        function addLoan() {
            loanCounter++;
            const loanId = `loan-${loanCounter}`;
            
            loans.push({
                id: loanId,
                name: `Creditor ${loanCounter}`,
                todayDate: new Date().toISOString().split('T')[0],
                statementDate: '',
                daysToAdd: 25,
                expectedRepaymentDate: '',
                principal: 0,
                yearlyRate: 0,
                rate: 0,
                months: 0
            });

            renderLoans();
        }

        function removeLoan(loanId) {
            loans = loans.filter(loan => loan.id !== loanId);
            renderLoans();
            updateSummary();
        }

        function updateLoan(loanId, field, value) {
            const loan = loans.find(l => l.id === loanId);
            if (loan) {
                // Store the value appropriately
                if (field === 'name') {
                    loan[field] = value;
                } else if (field === 'todayDate' || field === 'statementDate') {
                    loan[field] = value; // Keep date strings as-is
                } else {
                    loan[field] = parseFloat(value) || 0;
                }
                
                // If statement date or daysToAdd is updated, recalculate expected repayment date
                if ((field === 'statementDate' || field === 'daysToAdd') && loan.statementDate) {
                    // Simple: take statement date, add days
                    const parts = loan.statementDate.split('-'); // YYYY-MM-DD format
                    const year = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1; // JS months are 0-indexed
                    const day = parseInt(parts[2]);
                    
                    const statementDate = new Date(year, month, day);
                    const daysToAdd = parseInt(loan.daysToAdd) || 25;
                    
                    const repaymentDate = new Date(statementDate);
                    repaymentDate.setDate(repaymentDate.getDate() + daysToAdd);
                    
                    // Format back to YYYY-MM-DD
                    const repayYear = repaymentDate.getFullYear();
                    const repayMonth = String(repaymentDate.getMonth() + 1).padStart(2, '0');
                    const repayDay = String(repaymentDate.getDate()).padStart(2, '0');
                    
                    loan.expectedRepaymentDate = `${repayYear}-${repayMonth}-${repayDay}`;
                    
                    // Update the display
                    const repaymentInput = document.getElementById(`repayment-date-${loanId}`);
                    if (repaymentInput) {
                        repaymentInput.value = loan.expectedRepaymentDate;
                    }
                }
                
                calculateLoan(loanId);
                updateSummary();
            }
        }

        function updateYearlyRate(loanId, value) {
            const loan = loans.find(l => l.id === loanId);
            if (loan) {
                loan.yearlyRate = parseFloat(value) || 0;
                loan.rate = loan.yearlyRate / 12;
                
                // Update the monthly rate display
                const monthlyRateInput = document.getElementById(`monthly-rate-${loanId}`);
                if (monthlyRateInput) {
                    monthlyRateInput.value = loan.rate.toFixed(2);
                }
                
                calculateLoan(loanId);
                updateSummary();
            }
        }

        function calculateLoan(loanId) {
            const loan = loans.find(l => l.id === loanId);
            if (!loan || loan.principal === 0 || loan.months === 0) return;

            const monthlyPayment = calculateMonthlyPayment(loan.principal, loan.rate, loan.months);
            const totalPayment = monthlyPayment * loan.months;
            const totalInterest = totalPayment - loan.principal;

            loan.monthlyPayment = monthlyPayment;
            loan.totalPayment = totalPayment;
            loan.totalInterest = totalInterest;
            loan.schedule = generateAmortizationSchedule(loan.principal, loan.rate, loan.months, monthlyPayment, loan);

            // Store for modal access
            currentSchedule = loan.schedule;
            currentLoanData = loan;

            renderLoanResults(loanId);
        }

        function renderLoanResults(loanId) {
            const loan = loans.find(l => l.id === loanId);
            const resultsDiv = document.getElementById(`results-${loanId}`);
            
            if (!loan.monthlyPayment) {
                resultsDiv.innerHTML = '';
                return;
            }

            resultsDiv.innerHTML = `
                <div class="results">
                    <div class="result-row">
                        <span class="result-label">Monthly Payment:</span>
                        <span class="result-value">$${formatCurrency(loan.monthlyPayment, 0)}</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Total Interest:</span>
                        <span class="result-value">$${formatCurrency(loan.totalInterest, 2)}</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Total Payment:</span>
                        <span class="result-value">$${formatCurrency(loan.totalPayment, 0)}</span>
                    </div>
                    <button class="toggle-schedule" onclick="toggleSchedule('${loanId}')">
                        View Payment Schedule
                    </button>
                    <div class="schedule-container" id="schedule-${loanId}">
                        <p style="color: #667eea; font-size: 0.9em; margin-bottom: 10px; font-style: italic;">
                            💡 Click on any month to see detailed calculations, early payoff options, and daily savings plan
                        </p>
                        ${generateScheduleTable(loan.schedule)}
                    </div>
                </div>
            `;
        }

        function generateScheduleTable(schedule) {
            let html = '<table class="amortization-table"><thead><tr>';
            html += '<th>Month</th><th>Payment Date</th><th>Days Left</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th><th>Early Payoff</th>';
            html += '</tr></thead><tbody>';

            schedule.forEach((row, index) => {
                let dateStr = '-';
                if (row.paymentDate) {
                    // Format date properly
                    const year = row.paymentDate.getFullYear();
                    const month = row.paymentDate.toLocaleString('en-US', { month: 'short' });
                    const day = row.paymentDate.getDate();
                    dateStr = `${month} ${day}, ${year}`;
                }
                
                const daysLeftStr = row.daysFromToday !== null ? `${row.daysFromToday} days` : '-';
                const daysLeftColor = row.daysFromToday !== null && row.daysFromToday < 7 ? '#ff4444' : row.daysFromToday < 14 ? '#ff9800' : '#666';
                
                html += `<tr onclick="showWorkings(${index})">
                    <td>${row.month}</td>
                    <td>${dateStr}</td>
                    <td style="color: ${daysLeftColor}; font-weight: 600;">${daysLeftStr}</td>
                    <td>$${formatCurrency(row.payment, 0)}</td>
                    <td>$${formatCurrency(row.principal, 0)}</td>
                    <td>$${formatCurrency(row.interest, 2)}</td>
                    <td>$${formatCurrency(row.balance, 0)}</td>
                    <td style="color: #28a745; font-weight: 600;">$${formatCurrency(row.earlyPayoff, 0)}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            return html;
        }

        function toggleSchedule(loanId) {
            const scheduleDiv = document.getElementById(`schedule-${loanId}`);
            scheduleDiv.classList.toggle('show');
        }

        let currentSchedule = null;
        let currentLoanData = null;

        function showWorkings(monthIndex) {
            if (!currentSchedule || !currentLoanData) return;

            const month = currentSchedule[monthIndex];
            const prevBalance = monthIndex === 0 ? currentLoanData.principal : currentSchedule[monthIndex - 1].balance;
            const monthlyRate = currentLoanData.rate;
            const isFirstMonth = monthIndex === 0;

            let monthlyPaymentSection = '';
            if (isFirstMonth) {
                const P = currentLoanData.principal;
                const r = monthlyRate / 100;
                const n = currentLoanData.months;
                
                monthlyPaymentSection = `
                <div class="workings-section" style="background: #e8f5e9; border-left-color: #4caf50;">
                    <h4>🧮 How Monthly Payment is Calculated</h4>
                    <div class="calculation-step">
                        <span class="formula">Formula: M = P × [r(1 + r)ⁿ] / [(1 + r)ⁿ - 1]</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Where:</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">P (Principal) = $${formatCurrency(P, 0)}</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">r (Monthly Rate) = ${monthlyRate.toFixed(2)}% = ${r.toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">n (Months) = ${n}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Step 1: Calculate (1 + r)ⁿ</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">(1 + ${r.toFixed(6)})^${n} = ${Math.pow(1 + r, n).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Step 2: Calculate numerator [r(1 + r)ⁿ]</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">${r.toFixed(6)} × ${Math.pow(1 + r, n).toFixed(6)} = ${(r * Math.pow(1 + r, n)).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Step 3: Calculate denominator [(1 + r)ⁿ - 1]</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">${Math.pow(1 + r, n).toFixed(6)} - 1 = ${(Math.pow(1 + r, n) - 1).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Step 4: Divide numerator by denominator</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">${(r * Math.pow(1 + r, n)).toFixed(6)} ÷ ${(Math.pow(1 + r, n) - 1).toFixed(6)} = ${((r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1)).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px;">
                        <span class="formula">Step 5: Multiply by Principal</span>
                    </div>
                    <div class="calculation-step" style="margin-left: 20px;">
                        <span class="formula">$${P.toFixed(2)} × ${((r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1)).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px; padding: 10px; background: white; border-radius: 5px;">
                        <span class="formula">Monthly Payment (M) =</span>
                        <span class="result" style="font-size: 1.2em;">$${month.payment.toFixed(2)}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 15px; font-style: italic; color: #666; font-size: 0.9em;">
                        This formula ensures that ${n} equal payments will pay off the loan plus all interest exactly.
                    </div>
                </div>
                `;
            }

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h3>Month ${month.month} - Detailed Calculations</h3>
                
                ${monthlyPaymentSection}
                
                <div class="workings-section">
                    <h4>📊 Starting Values</h4>
                    <div class="calculation-step">
                        <span class="formula">Beginning Balance:</span>
                        <span class="result">$${formatCurrency(prevBalance, 0)}</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Monthly Interest Rate:</span>
                        <span class="result">${monthlyRate.toFixed(2)}%</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Fixed Monthly Payment:</span>
                        <span class="result">$${month.payment.toFixed(2)}</span>
                    </div>
                </div>

                <div class="workings-section">
                    <h4>💰 Step 1: Calculate Interest for This Month</h4>
                    <div class="calculation-step">
                        <span class="formula">Formula: Interest = Balance × (Monthly Rate ÷ 100)</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Interest = $${prevBalance.toFixed(2)} × (${monthlyRate.toFixed(2)} ÷ 100)</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Interest = $${prevBalance.toFixed(2)} × ${(monthlyRate/100).toFixed(6)}</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Interest =</span>
                        <span class="result">$${month.interest.toFixed(2)}</span>
                    </div>
                </div>

                <div class="workings-section">
                    <h4>🏦 Step 2: Calculate Principal Payment</h4>
                    <div class="calculation-step">
                        <span class="formula">Formula: Principal = Monthly Payment - Interest</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Principal = $${month.payment.toFixed(2)} - $${month.interest.toFixed(2)}</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Principal =</span>
                        <span class="result">$${month.principal.toFixed(2)}</span>
                    </div>
                </div>

                <div class="workings-section">
                    <h4>📉 Step 3: Calculate Remaining Balance</h4>
                    <div class="calculation-step">
                        <span class="formula">Formula: New Balance = Beginning Balance - Principal Payment</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">New Balance = $${prevBalance.toFixed(2)} - $${month.principal.toFixed(2)}</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">New Balance =</span>
                        <span class="result">$${month.balance.toFixed(2)}</span>
                    </div>
                </div>

                <div class="workings-section" style="background: #fff3e0; border-left-color: #ff9800;">
                    <h4>⚡ Early Payoff Option</h4>
                    <div class="calculation-step">
                        <span class="formula">To pay off the entire loan at the start of Month ${month.month}:</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Formula: Early Payoff = Remaining Balance + Current Month Interest</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Early Payoff = $${month.balance.toFixed(2)} + $${month.interest.toFixed(2)}</span>
                    </div>
                    <div class="calculation-step" style="padding: 10px; background: white; border-radius: 5px; margin-top: 10px;">
                        <span class="formula">Pay</span>
                        <span class="result" style="font-size: 1.2em;">$${month.earlyPayoff.toFixed(2)}</span>
                        <span class="formula"> to close the loan in Month ${month.month}</span>
                    </div>
                    <div class="calculation-step" style="margin-top: 10px; color: #e65100; font-weight: 600;">
                        💡 You'll save: $${(currentLoanData.totalInterest - month.interest - currentSchedule.slice(0, monthIndex).reduce((sum, m) => sum + m.interest, 0)).toFixed(2)} in future interest!
                    </div>
                </div>

                <div class="workings-section" style="background: #e3f2fd; border-left-color: #2196f3;">
                    <h4>📅 Daily Savings Plan</h4>
                    ${month.paymentDate ? `
                    <div class="calculation-step" style="padding: 15px; background: white; border-radius: 5px; margin-bottom: 15px; border: 2px solid #2196f3;">
                        <strong>📌 Important Dates:</strong><br><br>
                        <span class="formula">📄 Statement Generated:</span>
                        <span class="result">${new Date(currentLoanData.statementDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span><br>
                        <span class="formula">📅 Today's Date:</span>
                        <span class="result">${new Date(currentLoanData.todayDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span><br>
                        <span class="formula">💳 Payment Due Date (Statement + ${currentLoanData.daysToAdd || 25} days):</span>
                        <span class="result">${month.paymentDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span><br><br>
                        ${month.daysFromToday !== null ? `
                        <div style="background: ${month.daysFromToday < 7 ? '#ffebee' : month.daysFromToday < 14 ? '#fff3e0' : '#e3f2fd'}; padding: 10px; border-radius: 5px; margin-top: 10px;">
                            <span class="formula" style="font-size: 1.1em;">⏰ Time Left from Today:</span><br>
                            <span class="result" style="font-size: 1.5em; color: ${month.daysFromToday < 7 ? '#d32f2f' : month.daysFromToday < 14 ? '#f57c00' : '#1976d2'}; font-weight: bold;">${month.daysFromToday} days remaining</span>
                        </div>
                        ` : ''}
                    </div>
                    ` : ''}
                    <div class="calculation-step">
                        <span class="formula">To have enough for your monthly payment, save daily:</span>
                    </div>
                    <div class="calculation-step">
                        <span class="formula">Formula: Daily Savings = Monthly Payment ÷ Days Remaining from Today</span>
                    </div>
                    ${month.daysFromToday !== null && monthIndex === 0 ? `
                    <div class="calculation-step">
                        <span class="formula">Daily Savings = $${month.payment.toFixed(2)} ÷ ${month.daysFromToday} days (from today to payment date)</span>
                    </div>
                    ` : `
                    <div class="calculation-step">
                        <span class="formula">Daily Savings = $${month.payment.toFixed(2)} ÷ ${month.daysUntilPayment} days</span>
                    </div>
                    `}
                    <div class="calculation-step" style="padding: 15px; background: #4caf50; color: white; border-radius: 5px; margin-top: 10px;">
                        <span style="font-size: 0.9em;">Set aside each day:</span><br>
                        <span style="font-size: 1.8em; font-weight: bold;">$${month.dailySavings.toFixed(2)}</span>
                    </div>
                    ${monthIndex === 0 && month.daysFromToday !== null ? `
                    <div class="calculation-step" style="margin-top: 15px; padding: 15px; background: ${month.daysFromToday < 7 ? '#ffebee' : month.daysFromToday < 14 ? '#fff3e0' : '#e8f5e9'}; border-radius: 5px; border-left: 4px solid ${month.daysFromToday < 7 ? '#f44336' : month.daysFromToday < 14 ? '#ff9800' : '#4caf50'};">
                        <strong style="font-size: 1.1em;">⏰ Your First Payment Plan:</strong><br><br>
                        ${month.daysFromToday < 0 ? `
                            <span style="color: #d32f2f; font-weight: bold; font-size: 1.1em;">⚠️ PAYMENT IS OVERDUE by ${Math.abs(month.daysFromToday)} days!</span><br>
                            Payment was due: ${month.paymentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}<br>
                        ` : month.daysFromToday === 0 ? `
                            <span style="color: #ff9800; font-weight: bold; font-size: 1.1em;">⚠️ PAYMENT IS DUE TODAY!</span><br>
                        ` : `
                            <strong>Example:</strong><br>
                            • Statement generated: <strong>${new Date(currentLoanData.statementDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</strong><br>
                            • Today: <strong>${new Date(currentLoanData.todayDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</strong><br>
                            • Payment due: <strong>${month.paymentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</strong><br>
                            • Days you have: <strong style="font-size: 1.2em; color: ${month.daysFromToday < 7 ? '#d32f2f' : month.daysFromToday < 14 ? '#f57c00' : '#2e7d32'};">${month.daysFromToday} days</strong><br><br>
                            Starting <strong>TODAY</strong>, save <strong>$${formatCurrency(month.dailySavings, 2)}</strong> per day<br>
                            After ${month.daysFromToday} days: $${formatCurrency(month.dailySavings, 2)} × ${month.daysFromToday} = <strong>$${formatCurrency(month.dailySavings * month.daysFromToday, 0)}</strong> ✓
                        `}
                    </div>
                    ` : ''}
                </div>

                <div class="highlight-box">
                    <strong>Summary for Month ${month.month}:</strong><br><br>
                    ${month.paymentDate && month.daysFromToday !== null ? `
                    <strong style="color: #1976d2;">Timeline:</strong><br>
                    Statement: ${new Date(currentLoanData.statementDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} → 
                    Today: ${new Date(currentLoanData.todayDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} → 
                    Due: ${month.paymentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} 
                    (${month.daysFromToday} days left)<br><br>
                    ` : ''}
                    <strong>Regular Payment:</strong> Pay $${formatCurrency(month.payment, 0)} ($${formatCurrency(month.dailySavings, 2)}/day)<br>
                    • $${formatCurrency(month.interest, 2)} goes to interest<br>
                    • $${formatCurrency(month.principal, 0)} reduces your debt<br>
                    • $${formatCurrency(month.balance, 0)} remaining<br><br>
                    <strong style="color: #28a745;">Early Payoff Option:</strong> Pay $${formatCurrency(month.earlyPayoff, 0)} to close the debt early!
                </div>
            `;

            document.getElementById('workingsModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('workingsModal').classList.remove('show');
        }

        // Close modal when clicking outside
        document.getElementById('workingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function renderLoans() {
            const grid = document.getElementById('loansGrid');
            grid.innerHTML = '';

            loans.forEach((loan, index) => {
                const card = document.createElement('div');
                card.className = 'loan-card';
                card.innerHTML = `
                    ${loans.length > 1 ? `<button class="remove-btn" onclick="removeLoan('${loan.id}')">×</button>` : ''}
                    <h3>Debt ${index + 1}</h3>
                    
                    <div class="input-group">
                        <label>Creditor/Lender Name</label>
                        <input type="text" value="${loan.name}" 
                               onchange="updateLoan('${loan.id}', 'name', this.value)">
                    </div>
                    
                    <div class="input-group">
                        <label>Today's Date</label>
                        <input type="date" value="${loan.todayDate || new Date().toISOString().split('T')[0]}" 
                               id="today-date-${loan.id}"
                               onchange="updateLoan('${loan.id}', 'todayDate', this.value)">
                    </div>
                    
                    <div class="input-group">
                        <label>Statement Generated Date</label>
                        <input type="date" value="${loan.statementDate || ''}" 
                               id="statement-date-${loan.id}"
                               onchange="updateLoan('${loan.id}', 'statementDate', this.value)">
                        <small style="color: #666; font-size: 0.85em; margin-top: 5px; display: block;">
                            When the statement was issued
                        </small>
                    </div>
                    
                    <div class="input-group">
                        <label>Days Until First Payment</label>
                        <input type="number" value="${loan.daysToAdd || 25}" 
                               id="days-to-add-${loan.id}"
                               onchange="updateLoan('${loan.id}', 'daysToAdd', this.value)"
                               placeholder="e.g., 25"
                               min="1">
                        <small style="color: #666; font-size: 0.85em; margin-top: 5px; display: block;">
                            Number of days to add to statement date
                        </small>
                    </div>
                    
                    <div class="input-group">
                        <label>Expected First Repayment Date</label>
                        <input type="date" value="${loan.expectedRepaymentDate || ''}" 
                               id="repayment-date-${loan.id}"
                               readonly
                               style="background: #f0f0f0; cursor: not-allowed;">
                        <small style="color: #28a745; font-size: 0.85em; margin-top: 5px; display: block; font-weight: 600;">
                            Auto-calculated: Statement Date + Days
                        </small>
                    </div>
                    
                    <div class="input-group">
                        <label>Debt Amount ($)</label>
                        <input type="number" value="${loan.principal || ''}" 
                               onchange="updateLoan('${loan.id}', 'principal', this.value)"
                               placeholder="e.g., 12890">
                    </div>
                    
                    <div class="input-group">
                        <label>Yearly Interest Rate (%)</label>
                        <input type="number" step="0.01" value="${loan.yearlyRate || ''}" 
                               onchange="updateYearlyRate('${loan.id}', this.value)"
                               placeholder="e.g., 48">
                    </div>
                    
                    <div class="input-group">
                        <label>Monthly Interest Rate (%)</label>
                        <input type="number" step="0.01" value="${loan.rate || ''}" 
                               id="monthly-rate-${loan.id}"
                               readonly
                               style="background: #f0f0f0; cursor: not-allowed;"
                               placeholder="Auto-calculated">
                    </div>
                    
                    <div class="input-group">
                        <label>Repayment Period (Months)</label>
                        <input type="number" value="${loan.months || ''}" 
                               onchange="updateLoan('${loan.id}', 'months', this.value)"
                               placeholder="e.g., 10">
                    </div>
                    
                    <div id="results-${loan.id}"></div>
                `;
                grid.appendChild(card);
            });

            if (loans.length === 0) {
                addLoan();
            }
        }

        function updateSummary() {
            let totalBorrowed = 0;
            let totalInterest = 0;
            let totalPayment = 0;
            let combinedMonthly = 0;

            loans.forEach(loan => {
                if (loan.monthlyPayment) {
                    totalBorrowed += loan.principal;
                    totalInterest += loan.totalInterest;
                    totalPayment += loan.totalPayment;
                    combinedMonthly += loan.monthlyPayment;
                }
            });

            document.getElementById('totalBorrowed').textContent = `$${formatCurrency(totalBorrowed, 0)}`;
            document.getElementById('totalInterest').textContent = `$${formatCurrency(totalInterest, 2)}`;
            document.getElementById('totalPayment').textContent = `$${formatCurrency(totalPayment, 0)}`;
            document.getElementById('combinedMonthly').textContent = `$${formatCurrency(combinedMonthly, 0)}`;
        }

        // Initialize with one loan
        addLoan();
    </script>
</body>
</html>
